name: meditime
description: Smart medication reminder app — Material 3 UI
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # M3 icons
  material_design_icons_flutter: ^7.0.7296

  # Local storage
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_bloc: ^9.1.1

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.3
  flutter_timezone: ^3.0.1

  # Loud medication alarms (elderly-friendly — rings until stopped)
  alarm: ^5.2.1

  # Runtime permissions (battery optimization, full-screen intent, etc.)
  permission_handler: ^11.3.1

  # Image & PDF
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  pdf: ^3.10.8
  printing: ^5.12.0

  # QR code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0

  # Charts
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0

  # Biometric auth
  local_auth: ^2.1.8

  # HTTP
  dio: ^5.4.0
  equatable: ^2.0.8
  solar_icons: ^0.0.5
  flutter_screenutil: ^5.9.3
  fluttertoast: ^8.2.4
  drift: ^2.32.1
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.32.1

flutter:
  uses-material-design: true

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/fonts/
    - assets/sounds/
